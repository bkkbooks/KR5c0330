body:
  text: 三十六水法巨勝歌三十六水法礬石水取礬石一斤無膽而馬齒者納青竹筒中薄削筒表以硝石四兩覆薦上下深固其口納華池中三十日成水以華池和塗鐵鐵即如銅取白治鐡精内中成水又法取礬石三斤置生竹筒中薄削其表以納綿纏筒口埋之濕池四五日成水又法先以淳醋浸礬石浥浥乃盛之用硝石二兩漆固口埋地中深三尺十五日成水雄黄水取雄黄一斤納生竹筒中硝石四兩漆固口如上納華池中三十日成水又法用硝石二兩以鵜甁盛苦酒納筒中宻蓋埋中庭入土三尺二十日成水其味甘羙色黄濁也雌黄水取雌黄一斤納生竹筒中加硝石四兩漆固口如上納華池中三十日成水又法加礬石硝石各二兩以瓶盛埋地中二十日成水其味甘色黄丹砂水以丹砂一斤納生竹筒中加石膽二兩硝石四兩漆固口如上納華池中三十日成水又法石贍硝石各二兩甁盛埋如上三十日成水味苦色赤曽青水取曽青一斤納生竹筒中加硝石四兩汞二兩漆固口如上納華池中三十日成水又法用硝石二兩瓶盛埋如上三十日成水白青水取白青一斤兎血一合並安竹筒中納苦酒中五十日成水又法加硝石二兩瓶盛埋如上法三十目成水其味酸而色青月礬石水取礬石一斤丹砂三斤硝石一斤納竹筒中漆固口如上納華池中百日成水又法以雲英水溞令浥浥加硝石二兩以瓶盛埋如上三十日成水味辛苦其色青黑磁石水取磁石一斤雄黄一兩石膽一兩合擣納竹筒中漆固口如上納華池中三十日成水硫黃水取硫黄一斤八月桑上露一升硝石二兩納竹筒中漆固口如上納華池中三十日成水又法先以淳醋溞硫黃溲令浥浥納竹筒中加硝石二兩如上法埋地中十五日成水名曰包天之汋硝石水取硝石擣篩鹽漬令浥浥納竹筒中密固口埋地中四尺四寸五日成水又法硝石三斤納生竹筒中薄削竹纒約口埋濕地四尺五日成水又法治硝石以土龍血溞之令浥浥納竹筒中漆固口埋地中三尺十五日成水味苦名陽汋白石英水取白石英一斤鶴子血一升硝石四兩合納筒中漆固口納華池中三十日成水紫石英水取紫石英一斤納竹筒中加硝石四兩漆固口如上法納華池中四十日成水赤石脂水取赤石脂一斤烏犬血一升和之加硝石四兩納筒中漆固口如上法納華池中三十日成水玄石脂水取玄石脂一斤硝石四兩合納筒中漆固口如上埋入地五尺三十日成水渌石英水取渌石英一斤曾青一兩丹砂二兩合納竹筒中納華池中百日成水石桂英水取石挂英一斤生薑汁一升合納竹筒中訖納華池中十日成水石硫丹水取石硫丹一斤磁石一斤合擣納竹筒中埋之十日十夜成水紫賀石水以紫賀石一斤麻汁一升合溞納銅器中十日成永華石水取華石一斤丹砂二兩合納竹筒中埋入地一丈十日成水寒水石水以寒水石一斤石膽一兩合納竹筒中煑之一日成水也凝水石水双凝水石一斤青鳬血一合擣納竹筒中埋濕地入三尺十日成水冷石水以冷石一斤伏翼矢一升合擣納竹筒中埋之百日成水滑石水以滑石一斤雲母一升戎盬一升合納竹筒中埋之十日成水黃耳石水以黃耳石一斤八月百草上露一升合納竹筒中漬苦酒中百日成水九子石水以九子石一斤樗汁一升合擣納銅器中停之十日成水理石水以理石一斤竹瀝一升合納竹筒中漆固口埋入地五尺三十日成水又法治理石以淳醋溞令浥浥土金盛炭火熬三日而赤治之納竹筒中率一斤加硝石二兩漆固口埋地中深三尺二十日成水石腦水石腦一斤硫黄一斤合擣納竹筒中埋之十日成水雲母水取熟挼雲母粉一斤鹽水二兩硝石水一兩攪溞令浥浥納竹筒中埋入地五尺二十日成水又法治雲母粉以桂水戎盬水分等溞令浥浥納竹筒中率加硝石二兩漆固口如上法埋地中深三尺并空井无水者蓋之二十五日成水盛以銅器置濕地名曰雲英液以凝化石九英黃金水以金一斤緑礬二斤納生竹筒中潻固口納華也中五十日成水白銀水以白銀一斤麥醬清二升淳酒二升赤黍牡荆酒一升合納竹筒中漆固口如法納華池中三十日成水鉛錫水削鉛二斤相和硝石四兩合納筒中漆固口如法納華池中百日成水玉粉水玊粉一斤芍藥灰一升白犬血一升蠐螬十枚擣絞取汁合擣納竹筒中漆固口如法納華池中三十日成水又法取白玉如豬肪者以蟾蜍汁塗之即消潤如餌即粉解治之以棠梨實屑粉蟾蜍一日一夜化爲水取土龍汁和雲母水以溞玉粉令浥浥銅銚盛之一宿化成水名曰玉漿漆水漆一升大宿蟹十八枚覆之五十日成水又水取淳漆一斤置銅器中以大宿蟹十八枚納漆中一宿化成水復以雪母粉一斤納漆中一宿化成水復取白玊屑粉三斤納漆中三日化成水名曰神漿以藥汁即徹視神明光于四海无所不通桂水粉桂一斤葱涕三升合納竹筒中蒸之三日三夜成水又法治桂屑以白葱汁溞浥浥復以山中露水若雨雪及千里流水皆可以溞雲母桂令温置生竹筒中率一斤加硝石二兩塞甑中蒸之三日三夜即化爲水名日水石得鹽水法治下篩鹽以水溞之令浥浥簿削筒令盛之重宻塞其口埋入地四尺四寸以水濕其上四日成水右三十六水法古本省耍易可遵用而諸石中亦有非世所識丹藥不盡須之者其朱點頭十五種是後薦之限石名旣同所以合此也石膽水治石膽一斤溞以淳醋浥浥納竹筒中硝石二兩覆薦之漆固其口以甁盛醋納竹筒於中埋入地深三尺十五日成水名曰雲梁石汋銅青水治銅青溞以五汋水溲令浥浥納竹筒中一斤加硝石二兩漆固口埋之如上法十五日成水取蒸消之名華龍汐狀若青碧一名雲英汋戎鹽水治戒鹽一斤溞以土龍汁浥浥納竹筒中一斤加硝石三兩漆固口埋地中深三尺十五日成水鹵鹹水治鹵鹹溞以淳酒令浥浥納鐡器中炭火上熬之三日三夜赤出治之納竹筒中一斤加硝石二兩漆固口埋地中入三尺十五日成水名曰金溜液鐡華水取鐵華治之以雲英鹽水溞令浥浥納竹筒中一斤加硝石二兩漆固口納瓶醋中埋入地三尺四十五日成水名曰玄靈金慈汐水可以仙鉛釭水以五勺蜚霜雪以合金翁華粉溞以雲英鹽水令浥浥納竹筒中一斤硝石二兩漆固口置瓶醋中埋入地三尺以馬通火煴之三十日成水釭水治積雪溞以黄輕水銀令浥浥率一斤釭粉用水銀三兩納竹筒中漆固口置瓶醋中埋入地三尺馬通火煴三十日成水名曰流靜深邃處按此方合萬无不成也髙起曰當先投漬酒五石於所止流水之中若地無流水當作井和上投酒於井中以鎮地氣令學者皆飮食此水也發火嬴火也頓火之者令糠火至際一寸也傳授神經皆約齋盟用金魚一兩玊龍銀鐶以代剪髮㰱血之誓令世無此物又不可虚涉乖儀令謹撫青布四十尺以准金魚之信帛絹四十尺以承銀環玊龍之約並奉有經之師師當將散施山栖之客不得自割以爲身用所以明天約也永無私矣違盟則四極有法也作丹忌日春戊辰夏丁已戊申已巳丑未辰秋戊戍已玄辛玄庚子冬戊寅巳卯癸酉未戌及壬丙戊丁玄土戊癸辛已日建日殺反支无季孟仲季月收閉晦朔上朔八魁徃亡留後日皆凶作藥不成矣作六一泥亦須擇日即吉三十六水法
